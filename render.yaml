# Render Blueprint — https://render.com/docs/blueprint-spec

databases:
  - name: mini-ecommerce-db
    plan: free
    databaseName: ecommerce
    user: ecommerce

services:
  - type: web
    name: mini-e-commerce-backend
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-ecommerce-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
